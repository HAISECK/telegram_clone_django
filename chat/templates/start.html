<html>
<head>
    <title>Telegram Clone - Добро пожаловать</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 10px 25px; margin: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-register { background-color: #0088cc; color: white; }
        .btn-login { border: 2px solid #0088cc; color: #0088cc; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Telegram Clone</h1>
        <p>Добро пожаловать в мессенджер!</p>
        <a href="{% url 'login' %}" class="btn btn-login">Войти</a>
        <a href="{% url 'register' %}" class="btn btn-register">Создать аккаунт</a>
    </div>
</body>
</html>
